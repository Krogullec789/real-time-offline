services:
  db:
    image: postgres:15-alpine
    container_name: kanban-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kanban
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kanban"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/KanbanBoard.Api/Dockerfile
    container_name: kanban-backend-api
    ports:
      - "5212:5212"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__ApplyMigrations=true
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=kanban;Username=postgres;Password=postgres
      - Auth__ApiKey=dev-demo-key
      - Auth__AllowedBoardIds__0=00000000-0000-0000-0000-000000000001
      - Cors__AllowedOrigins__0=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=/api
        - VITE_SIGNALR_URL=/hubs/kanban
        - VITE_BOARD_ID=00000000-0000-0000-0000-000000000001
        - VITE_API_KEY=dev-demo-key
    container_name: kanban-frontend-spa
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
